## Font
# font_family Maple Mono Italic

# Make the cursor shape a beam
shell_integration no-cursor
cursor_shape beam

# Padding
window_padding_width 7
window_padding_height 10

# Scroll back up to 3000 lines.
scrollback_lines 3000

#Default font size.
font_size 11

# Just a keybind to change font size to your liking, it's CTRL + scroll wheel up or down.
map ctrl+shift+plus change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0

# Background opacity, set to 0 if you want blur/transparency.
# Blur works with hyprland, or sway-fx as a drop-in replacement for sway.
background_opacity 1


# Finally, the COLORS! these use the design system I made for this rice.
cursor               #00ff66

selection_background #7CF4A4
selection_foreground #909090

background           #000000
foreground           #00ff66

color0               #000000
color8               #404040
color1               #ff0033
color9               #ff3355
color2               #00ff66
color10              #00ff99
color3               #aaff00
color11              #ccff33
color4               #33aaff
color12              #66ccff
color5               #ff66cc
color13              #ff99cc
color6               #00ffff
color14              #00cccc
color7               #d0d0d0
color15              #ffffff


# BEGIN_KITTY_FONTS
font_family      "Terminus Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_features    none


# END_KITTY_FONTS
